name: The Gatekeeper (Public Entropy Defense)

on: 
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Sovereign Compiler (telac)
        run: cargo build --release --bin telac


      - name: Extract Coordinate and Verify GMN Parity
        id: verify_parity
        run: |
          TELA_FILES=$(find . -type f -name "*.tela" -not -path "*/node_modules/*" -not -path "*/target/*")
          
          if [ -z "$TELA_FILES" ]; then
            echo "::error::No .tela file found in this Pull Request."
            echo "reject_reason=missing_tela" >> $GITHUB_OUTPUT
            exit 1
          fi
          TELA_FILE=$(echo "$TELA_FILES" | head -n 1)
          echo "Found coordinate: $TELA_FILE"
          sim=$(./target/release/telac delta "$TELA_FILE")
          diff=$(echo "1 - $sim" | bc)
          echo "delta=$diff" >> $GITHUB_OUTPUT

      - name: Reject PR (If Missing .tela or GMN Delta > 0.02)
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const reason = '${{ steps.verify_parity.outputs.reject_reason }}';
            let message = '### Teleportation Gatekeeper Results �x\n\n';
            
            if (reason === 'missing_tela') {
              message += 'This Pull Request contains code modifications without a corresponding `.tela` coordinate file. All changes must be mathematically accounted for in the 1024-dimension space. Please define your intent in ` .tela` file and resubmit.';
            } else {
              const delta = parseFloat('${{ steps.verify_parity.outputs.delta }}');
              if (delta > 0.02) {
                message += `🚀 **GMN Structural Graph Check Failed!**\\n\\nThe Vector Delta ($$\\Delta$$) is greater than 0.02 (actual: ${delta}). If you attempted a lateral move or spoofed token similarity, the Graph Matching Network has mathematically exposed the hack.\n\nInitiating automated Gradient Descent feedback loop on the PR to recover geometry.`\
                ;
              } else {
                message += `  Movement mathematically validated. Parity check passed. GMN geometry is stable.`;
              }
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
            
            if (reason === 'missing_tela' || parseFloat('${{ steps.verify_parity.outputs.delta }}') > 0.02) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                state: 'closed'
              });
           }
          